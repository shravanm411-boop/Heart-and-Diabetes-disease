<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Combined Health Risk Prediction</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Bootstrap & Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" />

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(to right, #f9fdff, #ffffff);
      padding: 40px;
    }

    .container {
      max-width: 1100px;
      background: #ffffff;
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
    }

    h2 {
      text-align: center;
      font-weight: 600;
      color: #2c3e50;
      margin-bottom: 20px;
    }

    .icon-top {
      text-align: center;
      font-size: 60px;
      color: #0d6efd;
      margin-bottom: 10px;
    }

    label {
      margin-top: 10px;
      font-weight: 500;
    }

    input[type="number"] {
      border-radius: 8px !important;
    }

    .section-header {
      font-size: 20px;
      font-weight: 600;
      color: #444;
      margin-top: 25px;
      margin-bottom: 15px;
      border-bottom: 2px solid #eee;
      padding-bottom: 5px;
    }

    .btn-primary {
      margin-top: 30px;
      width: 100%;
      padding: 12px;
      font-size: 16px;
      font-weight: 600;
      border-radius: 10px;
    }

    .error {
      color: red;
      text-align: center;
      font-weight: bold;
      margin-bottom: 15px;
    }

    .footer {
      margin-top: 40px;
      text-align: center;
      font-size: 14px;
      color: #666;
    }

    .footer small {
      font-style: italic;
    }

    @media (max-width: 768px) {
      .container {
        padding: 25px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="icon-top">
      <i class="fas fa-diagnoses"></i>
    </div>
    <h2>Combined Heart & Diabetes Risk Prediction</h2>

    {% if error %}
      <p class="error">{{ error }}</p>
    {% endif %}

      <form action="/result_combined" method="post">

      <!-- Heart Section -->
      <div class="section-header">🫀 Heart Disease Inputs</div>
      <div class="row">
        <div class="col-md-4">
          <label>Age</label>
          <input type="number" name="age" class="form-control" required />
          <label>Sex (0 = F, 1 = M)</label>
          <input type="number" name="sex" min="0" max="1" class="form-control" required />
          <label>Chest Pain Type</label>
          <input type="number" name="cp" min="0" max="3" class="form-control" required />
          <label>Resting BP</label>
          <input type="number" name="trestbps" class="form-control" required />
        </div>
        <div class="col-md-4">
          <label>Cholesterol</label>
          <input type="number" name="chol" class="form-control" required />
          <label>Fasting Sugar > 120</label>
          <input type="number" name="fbs" min="0" max="1" class="form-control" required />
          <label>Resting ECG</label>
          <input type="number" name="restecg" min="0" max="2" class="form-control" required />
          <label>Max Heart Rate</label>
          <input type="number" name="thalach" class="form-control" required />
        </div>
        <div class="col-md-4">
          <label>Exercise Angina</label>
          <input type="number" name="exang" min="0" max="1" class="form-control" required />
          <label>ST Depression</label>
          <input type="number" step="0.1" name="oldpeak" class="form-control" required />
          <label>Slope</label>
          <input type="number" name="slope" min="0" max="2" class="form-control" required />
          <label>Major Vessels</label>
          <input type="number" name="ca" min="0" max="3" class="form-control" required />
          <label>Thalassemia</label>
          <input type="number" name="thal" min="0" max="2" class="form-control" required />
        </div>
      </div>

      <!-- Diabetes Section -->
      <div class="section-header mt-5">🩸 Diabetes Inputs</div>
      <div class="row">
        <div class="col-md-4">
          <label>Pregnancies</label>
          <input type="number" name="pregnancies" class="form-control" required />
          <label>Glucose</label>
          <input type="number" name="glucose" class="form-control" required />
          <label>Blood Pressure</label>
          <input type="number" name="bloodpressure" class="form-control" required />
        </div>
        <div class="col-md-4">
          <label>Skin Thickness</label>
          <input type="number" name="skinthickness" class="form-control" required />
          <label>Insulin</label>
          <input type="number" name="insulin" class="form-control" required />
          <label>BMI</label>
          <input type="number" step="0.1" name="bmi" class="form-control" required />
        </div>
        <div class="col-md-4">
          <label>Diabetes Pedigree Function</label>
          <input type="number" step="0.01" name="dpf" class="form-control" required />
        </div>
               
<div class="col-md-4">
  <label>Age</label>
  <input type="number" name="age" class="form-control" required />
</div>

      </div>

      <button type="submit" class="btn btn-primary">
        <i class="fas fa-vials me-2"></i> Predict Combined Risk
      </button>
    </form>

    <div class="footer mt-4">
      <small> &copy; @2025 MediPredict🏥</small>
    </div>
  </div>

</body>
</html>
