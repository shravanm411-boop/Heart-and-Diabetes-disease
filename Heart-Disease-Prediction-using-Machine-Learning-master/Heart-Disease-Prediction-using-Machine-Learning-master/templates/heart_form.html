<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Heart Disease Prediction</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Bootstrap & Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" />

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(to right, #f0faff, #ffffff);
      padding: 40px;
    }

    .container {
      max-width: 900px;
      background: #ffffff;
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
    }

    h2 {
      text-align: center;
      font-weight: 600;
      color: #2c3e50;
      margin-bottom: 25px;
    }

    .icon-top {
      text-align: center;
      font-size: 60px;
      color: #dc3545;
      margin-bottom: 10px;
    }

    label {
      margin-top: 10px;
      font-weight: 500;
    }

    input[type="number"] {
      border-radius: 8px !important;
    }

    .btn-primary {
      margin-top: 30px;
      width: 100%;
      padding: 12px;
      font-size: 16px;
      font-weight: 600;
      border-radius: 10px;
    }

    .error {
      color: red;
      text-align: center;
      font-weight: bold;
      margin-bottom: 15px;
    }

    .footer {
      margin-top: 40px;
      text-align: center;
      font-size: 14px;
      color: #666;
    }

    .footer small {
      font-style: italic;
    }

    @media (max-width: 768px) {
      .container {
        padding: 25px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="icon-top">
      <i class="fas fa-heartbeat"></i>
    </div>
    <h2>Heart Disease Risk Prediction</h2>

    {% if error %}
      <p class="error">{{ error }}</p>
    {% endif %}

    <form action="/result_heart" method="POST">
      <div class="row">
        <div class="col-md-6">
          <label>Age</label>
          <input type="number" name="age" class="form-control" required />

          <label>Sex (0 = Female, 1 = Male)</label>
          <input type="number" name="sex" min="0" max="1" class="form-control" required />

          <label>Chest Pain Type (0–3)</label>
          <input type="number" name="cp" min="0" max="3" class="form-control" required />

          <label>Resting Blood Pressure (mm Hg)</label>
          <input type="number" name="trestbps" class="form-control" required />

          <label>Cholesterol (mg/dl)</label>
          <input type="number" name="chol" class="form-control" required />

          <label>Fasting Blood Sugar > 120? (0 = No, 1 = Yes)</label>
          <input type="number" name="fbs" min="0" max="1" class="form-control" required />
        </div>

        <div class="col-md-6">
          <label>Resting ECG (0–2)</label>
          <input type="number" name="restecg" min="0" max="2" class="form-control" required />

          <label>Max Heart Rate Achieved</label>
          <input type="number" name="thalach" class="form-control" required />

          <label>Exercise Induced Angina (0/1)</label>
          <input type="number" name="exang" min="0" max="1" class="form-control" required />

          <label>ST Depression (Oldpeak)</label>
          <input type="number" step="0.1" name="oldpeak" class="form-control" required />

          <label>Slope of ST Segment (0–2)</label>
          <input type="number" name="slope" min="0" max="2" class="form-control" required />

          <label>Major Vessels Colored (0–3)</label>
          <input type="number" name="ca" min="0" max="3" class="form-control" required />

          <label>Thalassemia (0 = Normal, 1 = Fixed Defect, 2 = Reversible)</label>
          <input type="number" name="thal" min="0" max="2" class="form-control" required />
        </div>
      </div>

      <button type="submit" class="btn btn-primary">
        <i class="fas fa-check-circle me-2"></i> Predict
      </button>
    </form>

    <div class="footer mt-4">
      <small> &copy; @2025 MediPredict🏥</small>
    </div>
  </div>

</body>
</html>
