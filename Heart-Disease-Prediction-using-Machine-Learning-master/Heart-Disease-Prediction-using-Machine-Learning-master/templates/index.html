<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Health Prediction System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Fonts & Icons -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(to right, #e0f7fa, #fff);
      min-height: 100vh;
      color: #222;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      padding: 30px;
      text-align: center;
      backdrop-filter: blur(8px);
      background: rgba(255, 255, 255, 0.25);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.06);
    }

    header h1 {
      font-size: 2.8rem;
      font-weight: 700;
      color: #0d47a1;
    }

    header p {
      color: #555;
      font-size: 1.1rem;
      margin-top: 8px;
    }

    .hero {
      margin-top: 40px;
      text-align: center;
    }

    .hero img {
      width: 200px;
      margin-bottom: 20px;
    }

    .choices {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 30px;
      margin-top: 40px;
      padding: 0 20px;
    }

    .card {
      width: 280px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 20px;
      backdrop-filter: blur(10px);
      padding: 30px 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.3);
    }

    .card:hover {
      transform: translateY(-8px);
      box-shadow: 0 14px 32px rgba(0, 0, 0, 0.12);
    }

    .card i {
      font-size: 48px;
      color: #0d47a1;
      margin-bottom: 15px;
    }

    .card h3 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 15px;
    }

    .card a {
      display: inline-block;
      margin-top: 10px;
      padding: 10px 20px;
      background: linear-gradient(to right, #1976d2, #42a5f5);
      color: white;
      border-radius: 10px;
      font-weight: 500;
      text-decoration: none;
      transition: background 0.3s ease;
    }

    .card a:hover {
      background: linear-gradient(to right, #1565c0, #1e88e5);
    }

    footer {
      margin-top: auto;
      padding: 20px;
      font-size: 14px;
      color: #777;
      background: #f5f5f5;
      text-align: center;
      width: 100%;
    }

    @media (max-width: 768px) {
      .card {
        width: 90%;
      }

      header h1 {
        font-size: 2rem;
      }

      .hero img {
        width: 150px;
      }
    }
  </style>
</head>
<body>

  <header>
    <h1><i class="fas fa-stethoscope me-2"></i>Health Prediction System</h1>
    <p>MediPredict-Powered Predictions for Heart Disease & Diabetes</p>
  </header>


  <div class="choices">
    <div class="card">
      <i class="fas fa-heartbeat"></i>
      <h3>Heart Disease Prediction</h3>
      <a href="/predict_heart">Start</a>
    </div>

    <div class="card">
      <i class="fas fa-syringe"></i>
      <h3>Diabetes Prediction</h3>
      <a href="/predict_diabetes">Start</a>
    </div>

    <div class="card">
      <i class="fas fa-diagnoses"></i>
      <h3>Combined Prediction</h3>
      <a href="/combined_form">Start</a>
    </div>
  </div>

      <small> &copy; @2025 MediPredict🏥</small>
  </footer>

</body>
</html>
