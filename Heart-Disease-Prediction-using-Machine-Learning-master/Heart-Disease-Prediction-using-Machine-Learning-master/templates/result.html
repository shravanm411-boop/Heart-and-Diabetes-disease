<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Prediction Result</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Bootstrap & Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" />

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(to right, #f0f8ff, #ffffff);
      padding: 40px;
    }

    .container {
      max-width: 700px;
      background: #ffffff;
      padding: 40px;
      border-radius: 15px;
      text-align: center;
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.08);
    }

    h2 {
      font-weight: 600;
      margin-bottom: 20px;
      color: #2c3e50;
    }

    .result-icon {
      font-size: 60px;
      margin-bottom: 20px;
    }

    .positive {
      color: #e74c3c;
    }

    .negative {
      color: #28a745;
    }

    .result-text {
      font-size: 22px;
      font-weight: 500;
      margin-top: 10px;
      color: #444;
    }

    .btn-back {
      margin-top: 30px;
      padding: 10px 24px;
      font-size: 16px;
      border-radius: 8px;
    }

    .footer {
      margin-top: 40px;
      text-align: center;
      font-size: 14px;
      color: #666;
    }

    .footer small {
      font-style: italic;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>Prediction Result</h2>

    {% if prediction == 'at risk of Heart Disease' or prediction == 'likely Diabetic' %}
      <div class="result-icon positive">
        <i class="fas fa-exclamation-triangle"></i>
      </div>
      <div class="result-text">
        You are <strong>{{ prediction }}</strong>.
      </div>
    {% else %}
      <div class="result-icon negative">
        <i class="fas fa-check-circle"></i>
      </div>
      <div class="result-text">
        You are <strong>{{ prediction }}</strong>.
      </div>
    {% endif %}

    <a href="/" class="btn btn-primary btn-back">
      <i class="fas fa-arrow-left me-1"></i> Go Back
    </a>

    <div class="footer mt-4">
      <small> &copy; @2025 MediPredict🏥</small>
    </div>
  </div>

</body>
</html>
