<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Combined Prediction Result</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Bootstrap & Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" />

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(to right, #f7fbff, #ffffff);
      padding: 40px;
    }

    .container {
      max-width: 900px;
      background: #ffffff;
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
      text-align: center;
    }

    h2 {
      font-weight: 600;
      margin-bottom: 30px;
      color: #2c3e50;
    }

    .result-card {
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.06);
      margin-bottom: 20px;
    }

    .positive {
      background-color: #ffe6e6;
      color: #c0392b;
    }

    .negative {
      background-color: #eaffea;
      color: #27ae60;
    }

    .result-icon {
      font-size: 50px;
      margin-bottom: 15px;
    }

    .result-title {
      font-size: 20px;
      font-weight: 600;
    }

    .result-text {
      font-size: 18px;
      font-weight: 500;
    }

    .btn-back {
      margin-top: 30px;
      padding: 10px 24px;
      font-size: 16px;
      border-radius: 8px;
    }

    .footer {
      margin-top: 40px;
      text-align: center;
      font-size: 14px;
      color: #666;
    }

    .footer small {
      font-style: italic;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>Combined Prediction Result</h2>

    <div class="row">
      <!-- Heart Result -->
      <div class="col-md-6">
        <div class="result-card {% if heart_result == 'at risk of Heart Disease' %}positive{% else %}negative{% endif %}">
          <div class="result-icon">
            <i class="fas fa-heartbeat"></i>
          </div>
          <div class="result-title">Heart Disease</div>
          <div class="result-text">
            You are <strong>{{ heart_result }}</strong>.
          </div>
        </div>
      </div>

      <!-- Diabetes Result -->
      <div class="col-md-6">
        <div class="result-card {% if diabetes_result == 'likely Diabetic' %}positive{% else %}negative{% endif %}">
          <div class="result-icon">
            <i class="fas fa-syringe"></i>
          </div>
          <div class="result-title">Diabetes</div>
          <div class="result-text">
            You are <strong>{{ diabetes_result }}</strong>.
          </div>
        </div>
      </div>
    </div>

    <a href="/" class="btn btn-primary btn-back">
      <i class="fas fa-arrow-left me-1"></i> Go Back to Home
    </a>

    <div class="footer mt-4">
      <small> &copy; @2025 MediPredict🏥</small>
    </div>
  </div>

</body>
</html>
