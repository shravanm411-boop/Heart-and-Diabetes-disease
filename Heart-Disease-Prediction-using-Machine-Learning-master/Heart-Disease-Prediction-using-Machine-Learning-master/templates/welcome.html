<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Welcome | MediPredict</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Fonts & Icons -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      font-family: 'Poppins', sans-serif;
      overflow: hidden;
      background: #f1f4f9;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* Modern abstract SVG background */
    .background-blobs {
      position: absolute;
      width: 100%;
      height: 100%;
      z-index: 0;
      overflow: hidden;
    }

    .background-blobs svg {
      position: absolute;
      width: 120%;
      height: 120%;
      top: -10%;
      left: -10%;
      opacity: 0.35;
    }

    .welcome-box {
      position: relative;
      z-index: 1;
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(12px);
      padding: 50px 30px;
      max-width: 480px;
      width: 90%;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
    }

    .welcome-box i {
      font-size: 60px;
      margin-bottom: 20px;
      color: #0d47a1;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    .welcome-box h1 {
      font-size: 2.5rem;
      font-weight: 700;
      color: #0d47a1;
      margin-bottom: 10px;
    }

    .welcome-box p {
      font-size: 1.1rem;
      color: #333;
      margin-bottom: 30px;
    }

    .start-btn {
      display: inline-block;
      background: #0d47a1;
      color: white;
      padding: 12px 30px;
      border-radius: 30px;
      font-weight: 600;
      text-decoration: none;
      font-size: 16px;
      transition: all 0.3s ease;
    }

    .start-btn:hover {
      background: #1565c0;
    }

    @media (max-width: 600px) {
      .welcome-box h1 {
        font-size: 2rem;
      }

      .welcome-box p {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>

  <!-- Abstract blurred background -->
  <div class="background-blobs">
    <svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="blur1" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="60" />
        </filter>
      </defs>
      <circle cx="400" cy="300" r="200" fill="#90caf9" filter="url(#blur1)" />
      <circle cx="250" cy="200" r="150" fill="#f48fb1" filter="url(#blur1)" />
      <circle cx="600" cy="400" r="170" fill="#ce93d8" filter="url(#blur1)" />
    </svg>
  </div>

  <!-- Main welcome box -->
  <div class="welcome-box">
    <i class="fas fa-stethoscope"></i>
    <h1>MediPredict</h1>
    <p>Empowering your health With MediPredict🏥</p>
    <a href="/home" class="start-btn">Get Started</a>
  </div>

</body>
</html>
